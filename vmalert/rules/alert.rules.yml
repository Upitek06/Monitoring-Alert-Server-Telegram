groups:
  - name: server_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "CPU usage tinggi di {{ $labels.instance }}"
          description: "CPU usage {{ $value }}% di atas 80% selama 2 menit."

      - alert: HighRAMUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "RAM usage tinggi di {{ $labels.instance }}"
          description: "RAM usage {{ $value }}% di atas 85%."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "Disk usage tinggi di {{ $labels.instance }}"
          description: "Disk usage {{ $value }}% di atas 85%."

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter down di {{ $labels.instance }}"
          description: "Node Exporter tidak merespon selama 1 menit."
